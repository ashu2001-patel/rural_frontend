name: Deploy Frontend

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: rural-frontend
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout (UPDATED)
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ AWS Credentials (UPDATED)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Login to ECR (UPDATED)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ Build Docker Image
      - name: Build Docker Image
        run: docker build -t $ECR_REPOSITORY .

      # ✅ Tag Image
      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ secrets.ECR_URL }}/$ECR_REPOSITORY:latest

      # ✅ Push to ECR
      - name: Push to ECR
        run: docker push ${{ secrets.ECR_URL }}/$ECR_REPOSITORY:latest

      # ✅ Deploy to EC2 (FIXED)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # 🔥 LOGIN TO ECR (VERY IMPORTANT)
            aws ecr get-login-password --region eu-north-1 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.ECR_URL }}

            # 🔥 PULL IMAGE
            docker pull ${{ secrets.ECR_URL }}/rural-frontend:latest

            # 🔥 STOP OLD CONTAINER
            docker stop rural-frontend || true
            docker rm rural-frontend || true

            # 🔥 RUN NEW CONTAINER
            docker run -d -p 80:80 \
              --name rural-frontend \
              ${{ secrets.ECR_URL }}/rural-frontend:latest

            # 🔥 CLEANUP (optional but recommended)
            docker system prune -af

            # 🔥 VERIFY
            docker ps