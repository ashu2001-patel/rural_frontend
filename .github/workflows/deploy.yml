name: Deploy Frontend

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: rural-frontend
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t $ECR_REPOSITORY .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ secrets.ECR_URL }}/$ECR_REPOSITORY:latest

      - name: Push to ECR
        run: |
          docker push \
          ${{ secrets.ECR_URL }}/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true
          script: |
            echo "🚀 Starting Deployment..."

            aws ecr get-login-password --region eu-north-1 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.ECR_URL }}

            docker pull ${{ secrets.ECR_URL }}/rural-frontend:latest

            docker stop rural-frontend || true
            docker rm rural-frontend || true

            docker run -d -p 80:80 \
              --name rural-frontend \
              ${{ secrets.ECR_URL }}/rural-frontend:latest

            NEW_IP=$(curl -s http://checkip.amazonaws.com)
            cat > /tmp/config.js << CONF
            window.ENV = {
              USER_API: "http://$NEW_IP:5000/api",
              ANIMAL_API: "http://$NEW_IP:5001/api",
              TOOL_API: "http://$NEW_IP:5002/api"
            }
            CONF
            docker cp /tmp/config.js rural-frontend:/usr/share/nginx/html/config.js

            docker system prune -af
            docker ps
            echo "✅ Deployment Successful!"